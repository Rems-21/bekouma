{% extends 'base.html' %}
{% load static %}

{% block title %}Lien envoyé - RAOLY BTP{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-75">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card card shadow-lg">
                    <div class="card-body p-5 text-center">
                        <img src="{% static 'images/logo.png' %}" alt="RAOLY BTP" height="64" class="mb-3">
                        <h3 class="text-dark-nav">Vérifiez votre email</h3>
                        <p class="text-muted">
                            Si un compte existe avec cet email, un lien de réinitialisation vient d'être envoyé.
                        </p>
                        <a href="{% url 'accounts:login' %}" class="btn btn-outline-gold">
                            Retour à la connexion
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
