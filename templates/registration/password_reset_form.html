{% extends 'base.html' %}
{% load static %}

{% block title %}Mot de passe oublié - RAOLY BTP{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-75">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card card shadow-lg">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <img src="{% static 'images/logo.png' %}" alt="RAOLY BTP" height="64" class="mb-3">
                            <h3 class="text-dark-nav">Mot de passe oublié</h3>
                            <p class="text-muted mb-0">Entrez votre email pour recevoir un lien de réinitialisation.</p>
                        </div>

                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="{{ form.email.id_for_label }}" class="form-label fw-bold">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    {{ form.email }}
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary-gold w-100 btn-lg">
                                <i class="fas fa-paper-plane me-2"></i>Envoyer le lien
                            </button>
                        </form>

                        <hr>
                        <p class="text-center mb-0">
                            <a href="{% url 'accounts:login' %}" class="text-gold fw-bold text-decoration-none">
                                Retour à la connexion
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
